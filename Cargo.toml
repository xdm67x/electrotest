[package]
name = "electrotest"
version = "0.1.0"
edition = "2024"

[dependencies]
camino = { version = "1", features = ["serde1"] }
clap = { version = "4", features = ["derive"] }
directories = "5"
gherkin = "0.15"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "fs"] }
thiserror = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
